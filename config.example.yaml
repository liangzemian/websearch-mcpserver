# ==============================================
# websearch-mcp 配置文件样例
# 复制为 config.yaml 后根据需求修改
# 所有配置均支持环境变量覆盖（见下方说明）
# ==============================================

# MCP HTTP 服务监听端口
port: 8338

# 日志级别: debug / info / warn / error（默认 info）
log_level: info

# 搜索模式:
#   - baidu   : 仅使用百度千帆 AI Search API（默认）
#   - tavily  : 仅使用 Tavily Search API
#   - hybrid  : 并发请求百度和 Tavily，按 URL 去重后合并结果
#   - engine  : 纯引擎模式，无需 API Key，使用 Bing + 学术搜索引擎
mode: engine

# 网络环境: china（默认，自动跳过海外引擎） / international（启用全部引擎）
network: china

# 屏蔽站点列表（对所有搜索引擎生效）
black_list_host:
  - "baijiahao.baidu.com"
  - "csdn.net"
  - "csdn.com"
  - "gitcode.com"
  - "gitcode.net"
  - "baidu.com"
  - "weibo.com"
  - "sina.com.cn"

# ==============================================
# 百度千帆 AI Search API（mode=baidu 或 hybrid 时需要）
# 获取地址: https://console.bce.baidu.com/iam/#/iam/apikey/list
# 环境变量: BAIDU_SK
# ==============================================
baidu:
  api_key: ""

# ==============================================
# Tavily Search API（mode=tavily 或 hybrid 时需要）
# 获取地址: https://app.tavily.com/home
# 环境变量: TAVILY_SK
# ==============================================
tavily:
  api_key: ""

# ==============================================
# Bing 通用搜索引擎（兜底引擎 + engine 模式主力引擎）
# 无需 API Key，默认开启
# ==============================================
bing:
  enabled: true
  blocked: []              # Bing 专用屏蔽域名（与 black_list_host 合并）
  per_sec: 1               # 每秒限流（默认 1）
  per_min: 20              # 每分钟限流（默认 20）

# ==============================================
# 学术搜索引擎（无需 API Key）
# ==============================================
academic:
  enabled: true            # 学术引擎总开关（默认 true）
  bing_fallback: true      # 学术搜索时用 Bing 兜底（默认 true）
  # 各引擎独立禁用（默认 false = 启用）
  disable_arxiv: false
  disable_crossref: false
  disable_openalex: false
  disable_semantic_scholar: false
  disable_pubmed: false
  disable_google_scholar: false

# ==============================================
# 代理配置（仅用于海外学术引擎：Semantic Scholar、Google Scholar）
# ==============================================
proxy:
  enabled: false                    # 是否启用（默认 false，启用后才会初始化海外引擎）
  endpoint: "http://127.0.0.1:7897" # 代理端点（默认 7897）

# ==============================================
# LLM 配置（可选，用于搜索摘要生成）
# 环境变量: LLM_BASE_URL, LLM_API_KEY
# ==============================================
llm:
  base_url: "https://api.openai.com/v1"
  api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  model_id: "gpt-4o-mini"

# ==============================================
# 缓存配置（可选）
# ==============================================
cache:
  storage_path: "./data/search_cache.db"
  cleanup_interval: 30

# ==============================================
# Jina Reader 配置（可选，用于 cleanfetch 工具）
# 获取 API Key: https://jina.ai/reader/
# ==============================================
jina:
  api_key: ""
  base_url: ""

# ==============================================
# 日志文件滚动配置（可选）
# ==============================================
log:
  max_size: 1  # 单个日志文件最大 MB（默认 1）
  max_age: 1   # 保留天数（默认 1）
